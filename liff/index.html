<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ประวัติการกิน - PaPaiKin</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #FFF8F0; padding: 16px; }
    h1 { color: #C44A3A; margin-bottom: 4px; font-size: 22px; }
    .subtitle { color: #999; font-size: 13px; margin-bottom: 16px; }
    table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 6px rgba(0,0,0,0.1); }
    th { background: #D97A2B; color: white; padding: 10px 8px; font-size: 12px; text-align: center; }
    td { padding: 8px; font-size: 12px; text-align: center; border-bottom: 1px solid #f0e0d0; }
    td:nth-child(2) { text-align: left; }
    tr:last-child td { border-bottom: none; }
    .total-row td { background: #FFF0E0; font-weight: bold; }
    .loading { text-align: center; padding: 40px; color: #aaa; }
    .empty { text-align: center; padding: 40px; color: #aaa; font-size: 14px; }
  </style>
</head>
<body>
  <h1>🍽 ประวัติการกิน</h1>
  <p class="subtitle">ข้อมูลทั้งหมดที่บันทึกผ่าน PaPaiKin</p>
  <div id="content"><p class="loading">กำลังโหลด...</p></div>

  <script>
    const BACKEND_URL = 'REPLACE_WITH_YOUR_TUNNEL_URL';

    async function main() {
      await liff.init({ liffId: 'REPLACE_WITH_LIFF_ID' });
      if (!liff.isLoggedIn()) { liff.login(); return; }

      const profile = await liff.getProfile();
      const userId = profile.userId;

      const res = await fetch(`${BACKEND_URL}/history/data?userId=${userId}`);
      const entries = await res.json();

      const content = document.getElementById('content');

      if (entries.length === 0) {
        content.innerHTML = `<p class="empty">ยังไม่มีประวัติการกิน<br>ลองส่งรูปอาหารใน LINE ดูสิ!</p>`;
        return;
      }

      const total = entries.reduce((acc, e) => ({
        calories: acc.calories + e.calories,
        protein: acc.protein + e.protein,
        carb: acc.carb + e.carb,
        fat: acc.fat + e.fat,
      }), { calories: 0, protein: 0, carb: 0, fat: 0 });

      const rows = entries.map((e, i) => {
        const date = new Date(e.createdAt).toLocaleDateString('th-TH');
        return `<tr>
          <td>${i + 1}</td>
          <td>${e.menuName}</td>
          <td>${date}</td>
          <td>${e.calories}</td>
          <td>${e.protein}</td>
          <td>${e.carb}</td>
          <td>${e.fat}</td>
        </tr>`;
      }).join('');

      content.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>#</th><th>เมนู</th><th>วันที่</th>
              <th>แคล</th><th>โปรตีน</th><th>คาร์บ</th><th>ไขมัน</th>
            </tr>
          </thead>
          <tbody>
            ${rows}
            <tr class="total-row">
              <td colspan="3">รวมทั้งหมด</td>
              <td>${total.calories}</td>
              <td>${total.protein}</td>
              <td>${total.carb}</td>
              <td>${total.fat}</td>
            </tr>
          </tbody>
        </table>`;
    }

    main().catch(err => {
      document.getElementById('content').innerHTML = `<p class="empty">เกิดข้อผิดพลาด: ${err.message}</p>`;
    });
  </script>
</body>
</html>
